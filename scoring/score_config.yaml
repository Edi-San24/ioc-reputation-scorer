#Scoring/score_config.yaml
#Tunable weights for the IOC reputation scoring engine.
#Edit these values to adjust scoring behavior w/o changing code. 

source_weights:
  otx: 0.85
  malwarebazaar: 0.90
  urlhaus: 0.80
  feodo: 0.95

ioc_type_multipliers:
  ip: 1.0
  domain: 1.1
  hash: 1.3
  url: 1.05

recency_decay:
  fresh: 1.00 # 0-30 days 
  stale: 0.75 # 30-180
  aged: 0.50 # 180-365
  expired: 0.25 #365+ days 

severity_thresholds:
  critical: 85
  high: 65
  medium: 40
  low: 0

signal_weights:
  pulse_count: 0.40 # 40% of base score 
  source_count: 0.25 # 25% of base score
  tag_count: 0.15 # 15% of base score
  malware_family: 0.20 # 20% of base score





